<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch AcornWise Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .hero-pattern {
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="min-h-[70vh] flex items-center">
        <!-- Hero Section -->
        <section class="relative w-full overflow-hidden">
            <div class="absolute inset-0 hero-pattern opacity-50"></div>
            <div class="container mx-auto px-6 py-16 text-center relative z-10">
                <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-6 tracking-tight">
                    Welcome to <span class="text-blue-600">Acornwise Platform</span>
                </h1>
                <p class="mt-4 text-xl text-gray-600 max-w-2xl mx-auto mb-10">
                    We've moved! Our platform is now fully web-based. No downloads or installations required. Access all your courses and coding challenges directly in your browser.
                </p>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <a href="https://platform.acornwise.com.au" target="_blank" class="bg-blue-600 text-white font-bold py-4 px-10 rounded-xl shadow-lg hover:bg-blue-700 transition transform hover:-translate-y-1 flex items-center justify-center gap-2 text-lg">
                        <i class="fas fa-rocket"></i> Launch Platform
                    </a>
                </div>
                <p class="mt-8 text-gray-500 text-sm">
                    Recommended browsers: Chrome, Firefox, or Edge.
                </p>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="main.js"></script>
</body>
</html>
